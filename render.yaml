services:
  # Backend — FastAPI on Render's native Python runtime (no Docker)
  - type: web
    name: ai-chat-bot-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: backend-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_TYPE
        value: sqlite
      - key: SQLITE_PATH
        value: /data/app.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma_data
      - key: HF_MODELS_DIR
        value: /data/models_cache
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: HF_DISABLE_SSL
        value: "false"
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: FRONTEND_URL
        fromService:
          type: web
          name: ai-chat-bot-frontend
          property: hostWithScheme
      # Set AI provider keys in the Render dashboard:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1

  # Frontend — Vite build served as a Render Static Site (no Docker, no nginx)
  - type: web
    name: ai-chat-bot-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ai-chat-bot-backend
          property: hostWithScheme
